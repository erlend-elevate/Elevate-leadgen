[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# The Visibility Dossier SPA is served at /audit/ (prebuilt output committed in
# audit/ — rebuild via: cd dossier && npm run build && cp -r dist ../audit).
# SPA fallback: unknown /audit/* paths serve the app shell (existing files win).
[[redirects]]
  from = "/audit/*"
  to = "/audit/index.html"
  status = 200

[[headers]]
  for = "/audit/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/audit/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# The Visibility Dossier source (dossier/) is the source for /audit/ above.
# Never serve its raw source files on this site:
[[redirects]]
  from = "/dossier/*"
  to = "/404"
  status = 404

# Nevari client proposal (served at /nevari/). Keep it out of search indexes:
# it contains commercial terms and must not be indexable.
[[headers]]
  for = "/nevari/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/nevari/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/nevari/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
